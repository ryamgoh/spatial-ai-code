model: vllm
model_args:
  pretrained: deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B
  dtype: bfloat16
  gpu_memory_utilization: 0.8
  max_model_len: 8192
  reasoning_parser: deepseek_r1
  enforce_eager: true
  max_num_seqs: 16 # Lower batch size (default is 256)
include_path: ./config/tasks
tasks:
  # - sciq_shuffled_gen
  - spatial_eval_gen
limit: 10
apply_chat_template: true
num_fewshot: 0
batch_size: auto
device: cuda:0
output_path: ./results/deepseek-r1-distill-qwen-1.5b/
log_samples: true
gen_kwargs:
  temperature: 0.6
  do_sample: false
  max_gen_toks: 4096
  until: []
  # No structured_outputs - let model reason freely and extract answer from text
  # Regex constraint ignores model's reasoning and forces wrong answers!
  structured_outputs:
    # json:
    #   type: object
    #   properties:
    #     answer:
    #       type: string
    #       enum: ["A", "B", "C", "D"]
    #   required: ["answer"]
    regex: "Answer: [A-D]"
