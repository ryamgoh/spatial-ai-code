  ─── STEP 2 ───
  
  ▸ Building R_South:
    Round 0: D-set = ∅. newly_found = {E2}.
    Round 1 — expanding: {E2}.
      South-facts with (F, E2): (E1, E2) → E1.
      Discovered: {E1}. D-set = {E1}. newly_found = {E1}.
    Round 2 — expanding: {E1}.
      South-facts with (F, E1): none.
