  ─── STEP 3 ───
  
  DIR = Southwest → O must be in R_South AND R_West.
    (A) School = E1:     E1 ∈ R_South ✓  AND  E1 ∈ R_West ✓  →  SW of Café ✓
    (B) Bookstore = E3:  E3 ∉ R_South ✗  →  NOT SW of Café
  
  ─── STEP 4 — VERIFY ───
  
  School (E1) is SW of Café (E2):
    South chain: E2 →(S)→ E1  ✓
    West chain:  E2 →(W)→ E1  ✓
  
  Bookstore (E3) exclusion: E3 is North of E2 (from statement 2), so
  E3 cannot be South of E2. Confirmed. ✓
  
  ANSWER: A
  
  
