  ▸ Building R_West:
    Round 0: D-set = ∅. newly_found = {E2}.
    Round 1 — expanding: {E2}.
      West-facts with (F, E2): (E1, E2) → E1. (E3, E2) → E3.
      Discovered: {E1, E3}. D-set = {E1, E3}. newly_found = {E1, E3}.
    Round 2 — expanding: {E1, E3}.
