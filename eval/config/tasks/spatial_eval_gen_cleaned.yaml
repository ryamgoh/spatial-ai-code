# SpatialEval: Spatial reasoning benchmark
# https://huggingface.co/datasets/MilaWang/SpatialEval
#
# we are using an offline version
# this is cleaned
task: spatial_eval_gen_cleaned
dataset_path: json
dataset_name: null  # set to null for local files
dataset_kwargs:
  data_files: 
    test: "../spatialeval_cleaned.jsonl"
test_split: test
output_type: generate_until

# process_docs: !function utils.filter_spatialmap_and_update_oracle_answer_new

doc_to_text: |-
  {{text}}
doc_to_target: "{{oracle_option}}"

generation_kwargs:
  until: []

filter_list:
  - name: "extract-answer"
    filter:
      - function: "regex"
        regex_pattern: "Answer:\\s*([A-D](?:\\s*,\\s*[A-D])*)"
        group_select: -1  # Gets the LAST "Answer: ..." line

metric_list:
  - metric: !function utils.strict_acc
    aggregation: mean
    higher_is_better: true
  - metric: !function utils.loose_acc
    aggregation: mean
    higher_is_better: true

metadata:
  version: 1.1
  note: "This is an offline version of the SpatialEval dataset that has been cleaned"
  
