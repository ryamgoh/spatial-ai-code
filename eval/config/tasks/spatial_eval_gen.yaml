# SpatialEval: Spatial reasoning benchmark
# https://huggingface.co/datasets/MilaWang/SpatialEval
#
# Evaluates spatial reasoning on map-based questions
task: spatial_eval_gen
dataset_path: MilaWang/SpatialEval
dataset_name: tqa
test_split: test
output_type: generate_until

process_docs: !function utils.filter_spatialmap

doc_to_text: |-
  {{text}}
doc_to_target: "{{oracle_option}}"

generation_kwargs:
  until: []

filter_list:
  - name: "extract-answer"
    filter:
      - function: "regex"
        # First: Find the specific line starting with "Answer:"
        regex_pattern: "Answer: [A-D](, [A-D])*"
        group_select: 0
      - function: "regex"
        # Second: Extract all [A-D] letters from THAT line only
        regex_pattern: "([A-D])"

metric_list:
  - metric: !function utils.partial_acc
    aggregation: mean
    higher_is_better: true

metadata:
  version: 1.1
  note: "SpatialEval TQA subset filtered to spatialmap.* IDs Generative version"
  
