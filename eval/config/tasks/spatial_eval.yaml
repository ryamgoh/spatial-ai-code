# SpatialEval: Spatial reasoning benchmark
# https://huggingface.co/datasets/MilaWang/SpatialEval
#
# Evaluates spatial reasoning on map-based questions
task: spatial_eval
dataset_path: MilaWang/SpatialEval
dataset_name: tqa
test_split: test
output_type: multiple_choice

process_docs: !function utils.filter_spatialmap

doc_to_text: "{{text}}"
doc_to_target: "{{['A', 'B', 'C', 'D'].index(oracle_option)}}"
doc_to_choice:
  - "A"
  - "B"
  - "C"
  - "D"

metric_list:
  - metric: acc
    aggregation: mean
    higher_is_better: true
  - metric: mcc
    aggregation: !function utils.mcc
    higher_is_better: true

metadata:
  version: 1.0
  note: "SpatialEval TQA subset filtered to spatialmap.* IDs"
