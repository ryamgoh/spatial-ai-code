# SpatialEval: Spatial reasoning benchmark
# https://huggingface.co/datasets/MilaWang/SpatialEval
#
# Evaluates spatial reasoning on map-based questions
task: spatial_eval_gen_all
dataset_path: MilaWang/SpatialEval
dataset_name: tqa
test_split: test
output_type: generate_until

process_docs: !function utils.filter_spatialmap_and_update_oracle_answer_new

doc_to_text: |-
  {{text}}
doc_to_target: "{{oracle_option}}"

generation_kwargs:
  until: []

filter_list:
  - name: "extract-answer"
    filter:
      - function: "regex"
        regex_pattern: "Answer:\\s*([A-D](?:\\s*,\\s*[A-D])*)"
        group_select: -1  # Gets the LAST "Answer: ..." line

metric_list:
  - metric: !function utils.strict_acc
    aggregation: mean
    higher_is_better: true
  - metric: !function utils.loose_acc
    aggregation: mean
    higher_is_better: true

metadata:
  version: 1.1
  note: "SpatialEval TQA subset filtered to spatialmap.* IDs Generative version"
  
