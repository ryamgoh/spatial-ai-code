model: vllm
model_args:
  pretrained: deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B
  dtype: bfloat16
  gpu_memory_utilization: 0.8
  max_model_len: 1024
  reasoning_parser: deepseek_r1
  enforce_eager: true
  max_num_seqs: 16 # Lower batch size (default is 256)
include_path: ../configs/tasks
tasks:
  - sciq_shuffled_gen
  - spatial_eval_gen
limit: 100
num_fewshot: 0
batch_size: auto
device: cuda:0
output_path: ./results/deepseek-r1-distill-qwen-1.5b/
log_samples: true
gen_kwargs:
  max_tokens: 1000
  temperature: 0.0
  structured_outputs:
    choice: ["A", "B", "C", "D"]
 