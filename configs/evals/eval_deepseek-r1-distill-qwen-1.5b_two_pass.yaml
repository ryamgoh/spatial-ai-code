model: vllm_two_pass
model_args:
  pretrained: deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B
  max_thinking_tokens: 4096
  dtype: bfloat16
  gpu_memory_utilization: 0.8
  max_model_len: 8192
  peft_model: null
include_path: ../configs/evals/tasks
tasks:
  - spatial_eval_gen_rag
limit: 10
apply_chat_template: true
num_fewshot: 0
batch_size: 1
device: cuda:0
log_samples: true
output_path: ./results/deepseek-r1-distill-qwen-1.5b-two-pass/
