task: task_rag
group: custom
dataset_path: json
dataset_name: null
dataset_kwargs:
  data_files:
    test: ./data/task_rag.jsonl
output_type: multiple_choice
choices:
  - "A"
  - "B"
  - "C"
  - "D"
doc_to_text: |
  Context: {{context}}
  
  Question: {{question}}
  
  Answer:
doc_to_target: "{{answer}}"
doc_to_choice: "{{choices}}"
metric_list:
  - metric: acc
    aggregation: mean
    higher_is_better: true
metadata:
  version: 1.0